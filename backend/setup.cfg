# Configuration Flake8 du backend.
#
# max-line-length = 100 : le style par défaut de Flake8 (79) est plus strict que
# ce que pratique l'écosystème FastAPI/Black (88-100). On l'aligne sur 100 plutôt
# que de reformater artificiellement le code.
#
# NB : on n'ignore volontairement PAS F401 (import inutilisé) ni F841 (variable
# assignée jamais utilisée) : ce sont de vrais défauts, ils doivent être corrigés
# et non masqués.
[flake8]
max-line-length = 100
exclude =
    venv,
    .venv,
    __pycache__,
    .pytest_cache,
    build,
    dist
